<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="SynapseAI - Your intelligent AI assistant powered by advanced neural networks">
    <meta name="theme-color" content="#0a0a0f">
    <title>SynapseAI - Intelligent Assistant</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <div class="logo-icon">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M12 2L2 7l10 5 10-5-10-5z"></path>
                            <path d="M2 17l10 5 10-5"></path>
                            <path d="M2 12l10 5 10-5"></path>
                        </svg>
                    </div>
                    <span class="logo-text">SynapseAI</span>
                </div>
                <button class="new-chat-btn" id="newChatBtn">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="12" y1="5" x2="12" y2="19"></line>
                        <line x1="5" y1="12" x2="19" y2="12"></line>
                    </svg>
                    <span>New Chat</span>
                </button>
            </div>
            
            <div class="sidebar-content">
                <div class="sidebar-section-title">Recent Chats</div>
                <div class="chat-history" id="chatHistory">
                    <!-- Chat items will be rendered here -->
                </div>
            </div>
            
            <div class="sidebar-footer">
                <div class="sidebar-info">
                    <div class="status-indicator"></div>
                    <span>Powered by Ollama</span>
                </div>
            </div>
        </aside>

        <!-- Mobile sidebar toggle -->
        <button class="sidebar-toggle" id="sidebarToggle" aria-label="Toggle sidebar">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <line x1="3" y1="12" x2="21" y2="12"></line>
                <line x1="3" y1="6" x2="21" y2="6"></line>
                <line x1="3" y1="18" x2="21" y2="18"></line>
            </svg>
        </button>

        <!-- Main chat area -->
        <main class="main-content">
            <!-- Header -->
            <header class="main-header">
                <div class="header-title">
                    <h1>SynapseAI</h1>
                    <span class="model-badge">Ollama</span>
                </div>
            </header>

            <div class="chat-container" id="chatContainer">
                <!-- Welcome screen -->
                <div class="welcome-screen" id="welcomeScreen">
                    <div class="welcome-content">
                        <div class="welcome-icon">
                            <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                                <path d="M12 2L2 7l10 5 10-5-10-5z"></path>
                                <path d="M2 17l10 5 10-5"></path>
                                <path d="M2 12l10 5 10-5"></path>
                            </svg>
                        </div>
                        <h1 class="welcome-title">How can I help you today?</h1>
                        <p class="welcome-subtitle">Start a conversation or upload documents</p>
                    </div>
                    <div class="suggestion-grid">
                        <button class="suggestion-card" data-prompt="Explain quantum computing in simple terms">
                            <div class="suggestion-icon">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <circle cx="12" cy="12" r="10"></circle>
                                    <path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"></path>
                                    <line x1="12" y1="17" x2="12.01" y2="17"></line>
                                </svg>
                            </div>
                            <div class="suggestion-text">
                                <span class="suggestion-title">Explain concepts</span>
                                <span class="suggestion-desc">Break down complex topics</span>
                            </div>
                        </button>
                        <button class="suggestion-card" data-prompt="Write a Python function to sort a list efficiently">
                            <div class="suggestion-icon">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <polyline points="16 18 22 12 16 6"></polyline>
                                    <polyline points="8 6 2 12 8 18"></polyline>
                                </svg>
                            </div>
                            <div class="suggestion-text">
                                <span class="suggestion-title">Write code</span>
                                <span class="suggestion-desc">Generate clean, efficient code</span>
                            </div>
                        </button>
                        <button class="suggestion-card" data-prompt="Help me brainstorm creative ideas for a new project">
                            <div class="suggestion-icon">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"></path>
                                </svg>
                            </div>
                            <div class="suggestion-text">
                                <span class="suggestion-title">Brainstorm ideas</span>
                                <span class="suggestion-desc">Creative thinking partner</span>
                            </div>
                        </button>
                        <button class="suggestion-card" data-prompt="Help me write a professional email">
                            <div class="suggestion-icon">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
                                    <polyline points="22,6 12,13 2,6"></polyline>
                                </svg>
                            </div>
                            <div class="suggestion-text">
                                <span class="suggestion-title">Draft content</span>
                                <span class="suggestion-desc">Emails, docs, and more</span>
                            </div>
                        </button>
                    </div>
                </div>

                <!-- Chat messages -->
                <div class="chat-messages" id="chatMessages">
                    <!-- Messages will be rendered here -->
                </div>
            </div>

            <!-- Uploaded files indicator -->
            <div class="uploaded-files-bar" id="uploadedFilesBar">
                <div class="uploaded-files-list" id="filesList"></div>
            </div>

            <!-- Input area with integrated upload button -->
            <div class="input-container">
                <div class="input-wrapper">
                    <button class="upload-btn" id="uploadBtn" title="Upload files">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"></path>
                        </svg>
                    </button>
                    <input type="file" id="fileInput" multiple accept=".pdf,.docx,.txt" hidden>
                    <textarea 
                        id="messageInput" 
                        placeholder="Message SynapseAI..." 
                        rows="1"
                        autofocus
                    ></textarea>
                    <div class="input-actions">
                        <button class="send-btn" id="sendBtn" disabled title="Send message">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M22 2L11 13"></path>
                                <path d="M22 2L15 22L11 13L2 9L22 2Z"></path>
                            </svg>
                        </button>
                        <button class="stop-btn hidden" id="stopBtn" title="Stop generation">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
                                <rect x="6" y="6" width="12" height="12" rx="2"></rect>
                            </svg>
                        </button>
                    </div>
                </div>
                <p class="input-hint">SynapseAI can make mistakes. Consider checking important information.</p>
            </div>
        </main>
    </div>

    <!-- Sidebar overlay for mobile -->
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <!-- Rename chat modal -->
    <div class="modal" id="renameModal">
        <div class="modal-backdrop"></div>
        <div class="modal-content">
            <div class="modal-header">
                <h2>Rename Chat</h2>
                <button class="modal-close" id="renameCancel">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="18" y1="6" x2="6" y2="18"></line>
                        <line x1="6" y1="6" x2="18" y2="18"></line>
                    </svg>
                </button>
            </div>
            <input type="text" id="renameInput" placeholder="Enter chat name..." maxlength="100">
            <div class="modal-actions">
                <button class="modal-btn secondary" id="renameCancelBtn">Cancel</button>
                <button class="modal-btn primary" id="renameConfirm">Save</button>
            </div>
        </div>
    </div>

    <script src="/static/script.js"></script>
</body>
</html>
